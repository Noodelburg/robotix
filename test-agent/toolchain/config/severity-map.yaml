# severity-map.yaml
# -----------------
# Normalize common finding categories to shared severity labels so reporting and
# summarization do not depend on each worker inventing its own scale.

severity_map:
  broken-authorization: critical
  injection: high
  traversal: high
  ssrf: high
  data-exposure: high
  weak-authentication: high
  insecure-configuration: medium
  robustness: medium
  informational: informational
