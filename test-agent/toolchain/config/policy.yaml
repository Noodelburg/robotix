# policy.yaml
# -----------
# This file defines the main guardrails for the scaffold. The values are example
# defaults and should be reviewed before real testing against an approved target.

version: 1

# The repo root and run root tell the toolchain where run state should live.
workspace_root: .
run_root: toolchain/runs

# These locations are treated as expected write targets.
approved_write_roots:
  - toolchain/runs
  - .github/agents
  - .github/skills
  - .github/hooks
  - .github/copilot
  - .devcontainer

# These patterns represent obviously destructive or out-of-scope commands.
denied_command_patterns:
  - rm -rf
  - sudo
  - terraform apply
  - terraform destroy
  - kubectl delete
  - aws
  - gcloud
  - az

# These are the shell tools the current scaffold expects to use.
approved_shell_tools:
  - curl
  - jq
  - bash
  - python3

# A conservative default request rate for active testing tasks.
default_rate_limit_rps: 2

# Environment-variable name fragments that should be treated as secret-like values.
redact_env_patterns:
  - TOKEN
  - SECRET
  - PASSWORD
